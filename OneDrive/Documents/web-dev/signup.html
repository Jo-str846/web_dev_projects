<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .signup-container {
            min-height: 90vh; /* Slightly taller to fit more fields */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <header style="background-color: #0d3b36; color: white; padding: 20px; text-align: center;">
        <h1>Sign Up</h1>
        <h2>Create your new student account</h2>
    </header>

    <div class="container signup-container">
        <div class="card shadow" style="width: 100%; max-width: 500px; border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Register</h2>
                
                <form>
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
                    </div>

                    <div class="mb-3">
                        <label for="studentID" class="form-label">Student ID Number</label>
                        <input type="text" class="form-control" id="studentID" placeholder="123456" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">University Email</label>
                        <input type="email" class="form-control" id="email" placeholder="name@strathmore.edu" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Create Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" class="form-control" id="confirmPassword" required>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Create Account</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small>Already have an account? <a href="login.html">Sign In</a></small>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
