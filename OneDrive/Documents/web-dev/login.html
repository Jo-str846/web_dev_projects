<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
   
    <style>
        .login-container{
                min-height: 70vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
        .form-control{
                border: 1px solid #ced4da !important;
                padding: 12px;
            }
    </style>
</head>
<body  style="background-color: #b3c2c3; margin: 0; color:black; font-family:'Times New Roman', Times, serif; line-height: 1.6em;
    padding: 10px;">
    <div class="topnav">
        <a href="index.html">Home</a>

    </div>
   <header style="background-color: #0d3b36; color: white; padding: 20px; text-align: center;">
        <h1>Login</h1>
        <p>Login to your student account</p>
    </header>

    <div class="container login-container">
        <!-- Using Bootstrap's 'card' class for a professional look -->
        <div class="card shadow" style="width: 100%; max-width: 400px; border-radius: 15px;">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Sign In</h2>
                
                <form action="contacts.html">
                    <!-- Bootstrap Form Group -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@strathmore.edu" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>

                    <!-- Modern styled button -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Login</button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="signup.html">Sign Up</a></small>
                </div>
            </div>
        </div>
    </div>

    <!-- Your existing footer -->
    <footer class="footer">
        <p>&copy; 2026 My Website. All rights reserved.</p>
    </footer>
</body>
</html>
